services:
  postgres:
    image: postgres:16-alpine
    container_name: etf-postgres
    environment:
      POSTGRES_DB: ad_research
      POSTGRES_USER: etf
      POSTGRES_PASSWORD: ${DB_PASSWORD:-etf_research_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etf -d ad_research"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - etf-network

  redis:
    image: redis:7-alpine
    container_name: etf-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - etf-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: etf-backend
    ports:
      - "8000:8000"
    environment:
      TZ: Asia/Shanghai
      DATABASE_URL: postgresql+psycopg2://etf:${DB_PASSWORD:-etf_research_password}@postgres:5432/ad_research
      REDIS_URL: redis://redis:6379/0
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "cp -r /dist-image/* /app/web/dist/ && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --workers 1"
    networks:
      - etf-network

volumes:
  postgres_data:
  redis_data:

networks:
  etf-network:
    driver: bridge
