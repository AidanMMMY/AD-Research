services:
  postgres:
    image: postgres:16-alpine
    container_name: alloyresearch-postgres-dev
    environment:
      POSTGRES_DB: ad_research
      POSTGRES_USER: etf
      POSTGRES_PASSWORD: ${DB_PASSWORD:-etf_research_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etf -d ad_research"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ad-research-dev-network

  redis:
    image: redis:7-alpine
    container_name: alloyresearch-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ad-research-dev-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alloyresearch-backend-dev
    # Note: backend is reached via the docker internal network only.
    # alloyresearch-nginx (host-network) proxies /api/ → http://backend:8000.
    # We do NOT publish 8000 on the host because alloyresearch-nginx already binds
    # it for external traffic.
    env_file: .env
    environment:
      TZ: Asia/Shanghai
      DATABASE_URL: postgresql+psycopg2://etf:${DB_PASSWORD:-etf_research_password}@postgres:5432/ad_research
      REDIS_URL: redis://redis:6379/0
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8001:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "mkdir -p /app/web/dist && (cp -r /app/web/dist-image/* /app/web/dist/ 2>/dev/null || true) && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --workers 1"
    networks:
      - ad-research-dev-network

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alloyresearch-celery-worker-dev
    env_file: .env
    environment:
      TZ: Asia/Shanghai
      DATABASE_URL: postgresql+psycopg2://etf:${DB_PASSWORD:-etf_research_password}@postgres:5432/ad_research
      REDIS_URL: redis://redis:6379/0
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CNINFO_PDF_DIR: ${CNINFO_PDF_DIR:-/data/alloy-research/cninfo_pdfs}
    volumes:
      - .:/app
      - cninfo_pdfs:/data/alloy-research/cninfo_pdfs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.core.celery_app worker -l info -c 2 -Q celery,indicator,cninfo
    networks:
      - ad-research-dev-network

volumes:
  postgres_data:
  redis_data:
  cninfo_pdfs:

networks:
  ad-research-dev-network:
    driver: bridge
