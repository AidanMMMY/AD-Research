services:
  postgres:
    image: postgres:16-alpine
    container_name: alloyresearch-postgres
    environment:
      POSTGRES_DB: ad_research
      POSTGRES_USER: etf
      POSTGRES_PASSWORD: ${DB_PASSWORD:-etf_research_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etf -d ad_research"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - alloyresearch-network

  redis:
    image: redis:7-alpine
    container_name: alloyresearch-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - alloyresearch-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alloyresearch-backend
    # Note: backend is reached via the docker internal network only.
    # alloyresearch-nginx (host-network) proxies /api/ → http://backend:8000.
    # We do NOT publish 8000 on the host because alloyresearch-nginx already binds
    # it for external traffic.
    env_file: .env
    environment:
      TZ: Asia/Shanghai
      DATABASE_URL: postgresql+psycopg2://etf:${DB_PASSWORD:-etf_research_password}@postgres:5432/ad_research
      REDIS_URL: redis://redis:6379/0
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8001:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "mkdir -p /app/web/dist && (cp -r /dist-image/* /app/web/dist/ 2>/dev/null || true) && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --workers 1"
    networks:
      - alloyresearch-network

volumes:
  postgres_data:
  redis_data:

networks:
  alloyresearch-network:
    # NOTE: existing redis/postgres containers are attached to a
    # project-prefixed network (e.g. aliyun-ecs_alloyresearch-network), not the
    # default ad-research_alloyresearch-network that docker compose would create
    # when this file is invoked. Declaring the network external avoids
    # creating a duplicate network that the redis/postgres containers
    # are NOT on, which would otherwise produce
    # "Temporary failure in name resolution" on backend startup.
    external: true
    name: aliyun-ecs_alloyresearch-network
