# 全局 gzip 压缩，显著提升静态资源加载速度
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

# HTTP 服务（兼容原有 8000 端口访问，用于直接通过 IP:8000 访问）
server {
    listen 8000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # HTML 入口永不缓存，确保每次刷新都能拿到最新版本
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # 带 hash 的前端资源长期缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API 代理到后端
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 支持：关闭缓冲以实时推送日志
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
    }

    # 后端公开端点（健康检查、API 文档）
    location ~ ^/(health|docs|redoc|openapi.json)$ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSL 证书文件验证目录
    location /.well-known/ {
        alias /etc/nginx/ssl/.well-known/;
    }

    # 前端路由支持：未命中的路径回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# HTTP 80 端口：统一将 adresearch.net / www.adresearch.net 重定向到 HTTPS www
server {
    listen 80;
    server_name adresearch.net www.adresearch.net;

    # SSL 证书文件验证目录（保留，便于未来 ACME 续期）
    location /.well-known/ {
        alias /etc/nginx/ssl/.well-known/;
    }

    location / {
        return 301 https://www.adresearch.net$request_uri;
    }
}

# HTTPS 443 端口：裸域 adresearch.net -> www.adresearch.net
server {
    listen 443 ssl http2;
    server_name adresearch.net;

    ssl_certificate /etc/nginx/ssl/adresearch.net.pem;
    ssl_certificate_key /etc/nginx/ssl/adresearch.net.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    location /.well-known/ {
        alias /etc/nginx/ssl/.well-known/;
    }

    location / {
        return 301 https://www.adresearch.net$request_uri;
    }
}

# HTTPS 443 端口：主站点（www.adresearch.net）
server {
    listen 443 ssl http2;
    server_name www.adresearch.net;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate /etc/nginx/ssl/adresearch.net.pem;
    ssl_certificate_key /etc/nginx/ssl/adresearch.net.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
    }

    location ~ ^/(health|docs|redoc|openapi.json)$ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /.well-known/ {
        alias /etc/nginx/ssl/.well-known/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
