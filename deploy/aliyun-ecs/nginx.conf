# 全局 gzip 压缩，显著提升静态资源加载速度
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

# 速率限制共享内存区
limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;

# Access log format with upstream timing, for slow-endpoint diagnosis.
# The nginx:alpine default /etc/nginx/nginx.conf already defines log_format
# "main" and duplicate names are a fatal error, so use a distinct name here.
log_format main_timing '$remote_addr - $remote_user [$time_local] "$request" '
                       '$status $body_bytes_sent "$http_referer" '
                       '"$http_user_agent" "$http_x_forwarded_for" '
                       'rt=$request_time urt=$upstream_response_time';

# Docker 内部 DNS，配合 proxy_pass 变量实现后端容器 IP 动态重解析，
# 避免 backend 重启后 nginx 仍缓存旧 IP 导致 502。
resolver 127.0.0.11 valid=10s ipv6=off;

# HTTP 服务（兼容原有 8000 端口访问，用于直接通过 IP:8000 访问）
server {
    listen 8000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 动态解析 backend 主机名
    set $backend_url "http://backend:8000";

    # 带 upstream 耗时的访问日志（server 级 access_log 覆盖 http 级默认 main）
    access_log /var/log/nginx/access.log main_timing;

    # HTML 入口永不缓存，确保每次刷新都能拿到最新版本
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # 带 hash 的前端资源长期缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API 代理到后端（非 SSE 端点）
    location /api/ {
        limit_req zone=api burst=100 nodelay;
        proxy_pass $backend_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
    }

    # SSE 端点保持长超时。后端路由均带 /v1 前缀：
    # /api/v1/stream/prices、/api/v1/notifications/stream、
    # /api/v1/research/chat/sessions/{id}/messages/stream、/api/v1/admin/logs/stream
    location ~ ^/api/v1/(.*/)?stream(/|$) {
        limit_req zone=api burst=100 nodelay;
        proxy_pass $backend_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
    }

    # 后端公开端点（健康检查、API 文档）
    location ~ ^/(health|docs|redoc|openapi.json)$ {
        proxy_pass $backend_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSL 证书文件验证目录
    location /.well-known/ {
        alias /etc/nginx/ssl/.well-known/;
    }

    # 前端路由支持：未命中的路径回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# HTTP 80 端口：统一将 alloyresearch.net / www.alloyresearch.net 重定向到 HTTPS www
server {
    listen 80;
    server_name alloyresearch.net www.alloyresearch.net;

    # SSL 证书文件验证目录（保留，便于未来 ACME 续期）
    location /.well-known/ {
        alias /etc/nginx/ssl/.well-known/;
    }

    location / {
        return 301 https://www.alloyresearch.net$request_uri;
    }
}

# HTTPS 443 端口：裸域 alloyresearch.net -> www.alloyresearch.net
server {
    listen 443 ssl;
    http2 on;
    server_name alloyresearch.net;

    ssl_certificate /etc/nginx/ssl/www.alloyresearch.net.pem;
    ssl_certificate_key /etc/nginx/ssl/www.alloyresearch.net.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /.well-known/ {
        alias /etc/nginx/ssl/.well-known/;
    }

    location / {
        return 301 https://www.alloyresearch.net$request_uri;
    }
}

# HTTPS 443 端口：主站点（www.alloyresearch.net）
