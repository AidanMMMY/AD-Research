    # /api/v1/research/chat/sessions/{id}/messages/stream、/api/v1/admin/logs/stream
    location ~ ^/api/v1/(.*/)?stream(/|$) {
        limit_req zone=api burst=100 nodelay;
        proxy_pass $backend_url;
        proxy_set_header Host $host;
