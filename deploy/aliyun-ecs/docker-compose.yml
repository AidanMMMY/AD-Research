# 阿里云 ECS 生产环境部署配置
# 使用说明见同目录 README.md

services:
  postgres:
    image: postgres:16-alpine
    container_name: etf-postgres
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      POSTGRES_DB: ${POSTGRES_DB:-ad_research}
      POSTGRES_USER: ${POSTGRES_USER:-etf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-etf} -d ${POSTGRES_DB:-ad_research}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - etf-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: etf-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - etf-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  backend:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: ad-research:latest
    pull_policy: never
    container_name: etf-backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      TZ: Asia/Shanghai
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-etf}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ad_research}
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      TIINGO_API_KEY: ${TIINGO_API_KEY:-}
      FMP_API_KEY: ${FMP_API_KEY:-}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:?error AUTH_SECRET_KEY is required}
      AUTH_ADMIN_PASSWORD: ${AUTH_ADMIN_PASSWORD:?error AUTH_ADMIN_PASSWORD is required}
      AUTH_ACCESS_TOKEN_EXPIRE_MINUTES: ${AUTH_ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPO: ${GITHUB_REPO:-}
      ENABLE_SCHEDULER: ${ENABLE_SCHEDULER:-true}
      FRED_API_KEY: ${FRED_API_KEY:-}
      BEA_API_KEY: ${BEA_API_KEY:-}
      BLS_API_KEY: ${BLS_API_KEY:-}
      XUEQIU_COOKIE: ${XUEQIU_COOKIE:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - web_dist:/app/web/dist
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: >
      sh -c "rsync -a --delete /app/web/dist-image/ /app/web/dist/ &&
             alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks:
      - etf-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  nginx:
    image: nginx:alpine
    container_name: etf-nginx
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "80:80"
      - "443:443"
    volumes:
      - web_dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - etf-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  web_dist:

networks:
  etf-network:
    driver: bridge
