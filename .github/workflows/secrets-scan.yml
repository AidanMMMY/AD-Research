name: secrets-scan

# 仅对 PR 触发：在代码合入 main 之前拦截 secret 泄露。
# 不要把这个 workflow 接入 push 触发（deploy.yml）—— 太晚才发现，
# 泄露的 secret 已经进了主分支历史。
on:
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false