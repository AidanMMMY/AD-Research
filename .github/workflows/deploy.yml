name: Deploy to Aliyun

# 触发：
#   - push to main：自动同步部署
#   - workflow_dispatch：手动触发（支持传 ref / skip_migrations / dry_run）
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "要部署的 git ref（默认 origin/main）"
        required: false
        default: "origin/main"
      skip_migrations:
        description: "跳过 alembic 迁移校验（不推荐）"
        required: false
        default: "false"
      dry_run:
        description: "只拉代码 + 健康检查，不重建镜像"
        required: false
        default: "false"

env:
  PROJECT_ROOT: /opt/ad-research
  BACKEND_CONTAINER: alloyresearch-backend
  ROLLBACK_LOG_DIR: /var/log/ad-research

jobs:
  deploy:
    runs-on: self-hosted
    concurrency:
      group: aliyun-deploy
      cancel-in-progress: false
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ──
      - name: Checkout (self-hosted machine)
        run: |
          echo "Self-hosted runner 直接使用 ${PROJECT_ROOT} 现有工作树"
          cd "${PROJECT_ROOT}"
          git --version
          pwd
          git rev-parse --is-inside-work-tree

      # ── 2. 同步代码：备份 head → fetch → reset --hard ──
      - name: Sync to origin/main (with head backup)
        id: sync_code
        run: |
          set -euo pipefail
          cd "${PROJECT_ROOT}"

          TARGET_REF="origin/main"
          if [ -n "${{ inputs.ref }}" ] && [ "${{ inputs.ref }}" != "origin/main" ]; then
            TARGET_REF="${{ inputs.ref }}"
          fi

          if ! PREVIOUS_LOG=$(bash "${PROJECT_ROOT}/scripts/rotate-log.sh" "${ROLLBACK_LOG_DIR}" "previous_head" "txt" "previous_head" 10 2>/dev/null); then
            echo "[WARN] 无法创建 ${ROLLBACK_LOG_DIR}，previous_head 将写入 /tmp"
            PREVIOUS_LOG="/tmp/previous_head"
          fi

          PREVIOUS_HEAD=$(git rev-parse HEAD)
          echo "${PREVIOUS_HEAD}" | tee "${PREVIOUS_LOG}"
          echo "previous_head=${PREVIOUS_HEAD}" >> $GITHUB_OUTPUT
          echo "[INFO] 备份当前 HEAD：${PREVIOUS_HEAD:0:7} → ${PREVIOUS_LOG}"

          # 确保目标 ref 存在
          git fetch --all --prune
          if ! git rev-parse --verify "${TARGET_REF}" >/dev/null 2>&1; then
            echo "[ERROR] 目标 ref 不存在：${TARGET_REF}"
            exit 1
          fi

          # 安全 reset：先 dry-check 工作树状态
          if [ -n "$(git status --porcelain)" ]; then
            # Action-253 follow-up: previously we silently `git clean -fd`'d
            # half-finished local edits, so untracked files (new endpoints,
            # models, alembic migrations) were never deployed. Bail loudly
            # so a developer commits the work first instead of losing it.
            echo "::error::工作树有未提交变更，请先 commit + push 再部署。"
            echo "::error::检测到的变更："
            git status --porcelain | head -50
            exit 1
          fi

          git reset --hard "${TARGET_REF}"
          echo "[INFO] 已同步到：$(git rev-parse --short HEAD)"

      # ── 2.5 部署前基线健康检查 ──
      - name: Pre-deploy baseline health check
        run: |
          set -euo pipefail
          BASELINE_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health || echo "000")
          echo "[INFO] 部署前 baseline /health status: ${BASELINE_STATUS}"
          echo "baseline_status=${BASELINE_STATUS}" >> $GITHUB_ENV

      # ── 3. 调用统一入口：deploy/aliyun-ecs/update.sh ──
      # 近期 4/10 失败多为阿里云 HTTP/2 registry 抖动；外层包一次 retry step
      # （最多 2 次，间隔 30s），第二次失败则硬退出。
      - name: Run update.sh (unified entrypoint) [attempt 1/2]
        id: update_sh
        if: ${{ inputs.dry_run != 'true' }}
        env:
          FORCE: 1
        # 2026-07-23 fix：加 timeout-minutes: 15 —— 否则 GitHub Actions 默认 step 无
        # 超时只能等 job-level 45min 截断；#316/#317 都是 step 5 跑 > 20 min 才结束，
        # 与 job-level timeout 一起切掉的是 runner host（不是 update.sh）的真实故障。
        # 这是 deploy.yml 三个连续失败 run 的最低成本修复；后续若 step 5 需要 > 15 min
        # 应该改成 background + cancel mechanism 而不是放宽超时。
        timeout-minutes: 15
        # 第一次失败不立刻终止 workflow，让 retry step 有机会触发
        continue-on-error: true
        run: |
          set -euo pipefail
          cd "${PROJECT_ROOT}/deploy/aliyun-ecs"

          EXTRA_ARGS=""
          if [ "${{ inputs.skip_migrations }}" = "true" ]; then
            EXTRA_ARGS="--no-db"
          fi

          bash update.sh ${EXTRA_ARGS}

      - name: Retry Run update.sh (unified entrypoint) [attempt 2/2]
        id: update_sh_retry
        # continue-on-error 会把 conclusion 重写为 success，必须用 outcome 判断真实结果
        if: ${{ inputs.dry_run != 'true' && steps.update_sh.outcome == 'failure' }}
        env:
          FORCE: 1
        timeout-minutes: 15
        # 最终重试：失败硬退出，不再继续后续 step（健康检查、迁移、通知）
        continue-on-error: false
        run: |
          echo "[RETRY] update.sh 上一次失败（多为阿里云 HTTP/2 registry 抖动），30s 后重试"
          sleep 30
          set -euo pipefail
          cd "${PROJECT_ROOT}/deploy/aliyun-ecs"

          EXTRA_ARGS=""
          if [ "${{ inputs.skip_migrations }}" = "true" ]]; then
            EXTRA_ARGS="--no-db"
          fi

          bash update.sh ${EXTRA_ARGS}

      # ── 3.5 Backend smoke check：导入 + 迁移 + endpoint ping ──
      - name: Backend smoke check
        if: ${{ inputs.dry_run != 'true' }}
        timeout-minutes: 5
        run: |
          set -euo pipefail
          echo "[SMOKE] 校验 backend 容器内 Python 导入 + alembic current + endpoint 响应"
          docker exec "${BACKEND_CONTAINER}" python -c "from app.main import app; print('routes:', len(app.routes))"
          docker exec "${BACKEND_CONTAINER}" alembic current
          # Action-253 follow-up: import + alembic alone miss runtime
          # problems (pool exhaustion, route 500, missing endpoint).
          # Probe endpoints and verify /health body status=ok.
          docker exec -i "${BACKEND_CONTAINER}" python - <<'PY'
          import json, urllib.request
          for path in ('/health', '/openapi.json'):
              try:
                  resp = urllib.request.urlopen(f'http://localhost:8000{path}', timeout=5)
                  body = resp.read().decode()
                  print(f'[SMOKE] {path} -> {resp.status}')
                  if path == '/health':
                      report = json.loads(body)
                      if report.get('status') != 'ok':
                          raise RuntimeError(f'/health status={report.get("status")}: {body[:500]}')
              except Exception as e:
                  print(f'[SMOKE] {path} -> ERR {e}')
                  raise
          PY

      - name: Dry-run skip rebuild, just sync code
        if: ${{ inputs.dry_run == 'true' }}
        run: |
          echo "[INFO] dry_run=true：仅同步代码，不重建镜像"
          echo "[INFO] 如需真正部署，请触发 workflow_dispatch 时将 dry_run 设为 false"

      # ── 4. alembic 迁移完整性校验（只读） ──
      # backend 容器入口是唯一的 alembic upgrade head 执行点。
      # 这里只做 current == head 校验，不主动执行升级。
      - name: Wait for backend to be running
        run: |
          set -euo pipefail
          cd "${PROJECT_ROOT}/deploy/aliyun-ecs"
          for i in $(seq 1 30); do
            if docker compose ps --services --filter "status=running" | grep -q "^backend$"; then
              echo "[OK] backend is running"
              exit 0
            fi
            echo "[WAIT] backend not running yet ($i/30)"
            sleep 2
          done
          echo "::error::backend container not running after 60s"
          docker compose logs backend --tail 100 || true
          exit 1

      - name: Check alembic migrations (head must equal current)
        id: check_migrations
        run: |
          set -euo pipefail
          cd "${PROJECT_ROOT}"

          # check_migrations.sh 退出码：
          #   0 = OK
          #   10 = 需要 migrate
          #   20 = 异常
          set +e
          bash scripts/check_migrations.sh deploy/aliyun-ecs/docker-compose.yml
          RC=$?
          set -e

          echo "check_migrations exit code: ${RC}"

          case "${RC}" in
            0)
              echo "[OK] migrations are in sync"
              ;;
            10)
              echo "::error title=需要数据库迁移::alembic head 与 current 不一致"
              echo "::error::backend 入口迁移可能失败或未执行，触发自动回滚"
              exit 1
              ;;
            *)
              echo "::error title=migration 校验异常::check_migrations.sh 退出码 ${RC}"
              exit 1
              ;;
          esac

      # ── 5. Health probe ──
      - name: Health probe
        id: health_probe
        run: |
          set -euo pipefail
          echo "[INFO] 等待 backend 就绪..."

          # backend service 只 expose 8000 给容器网络，没有映射到 host，
          # 因此不能从 host curl localhost:8000/health。在容器内探测。
          HEALTHY=false
          for i in $(seq 1 30); do
            _status=$(docker exec "${BACKEND_CONTAINER}" python -c "import urllib.request, json; r=json.loads(urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()); print(r.get('status','unknown'))" 2>/dev/null || echo "ERR")
            if [ "${_status}" = "ok" ]; then
              echo "[OK] /health status=ok（第 ${i} 次，容器内 localhost:8000）"
              HEALTHY=true
              break
            fi
            echo "[WAIT] 第 ${i}/30 次探测失败（status=${_status}），2s 后重试..."
            sleep 2
          done

          if [ "${HEALTHY}" != "true" ]; then
            echo "::error title=健康检查失败::60s 内 /health 未通过"
            docker ps | grep "${BACKEND_CONTAINER}" || true
            docker compose -f "${PROJECT_ROOT}/deploy/aliyun-ecs/docker-compose.yml" logs backend --tail 100 || true
            exit 1
          fi

      # ── 6. 失败时自动回滚 + 通知 ──
      - name: Rollback on failure
        if: failure()
        run: |
          set -euo pipefail
          PREVIOUS_HEAD=$(cat "${ROLLBACK_LOG_DIR}/previous_head" 2>/dev/null || echo "")
          CURRENT_HEAD=$(cd "${PROJECT_ROOT}" && git rev-parse HEAD 2>/dev/null || echo "unknown")

          echo "::error::部署失败，current=${CURRENT_HEAD:0:7}，准备回滚到 previous=${PREVIOUS_HEAD:0:7}"

          if [ -n "${PREVIOUS_HEAD}" ] && [ "${PREVIOUS_HEAD}" != "${CURRENT_HEAD}" ]; then
            if bash "${PROJECT_ROOT}/scripts/rollback.sh" "${PREVIOUS_HEAD}"; then
              echo "[OK] 自动回滚完成"
              # 回滚后再做一次健康检查
              for i in $(seq 1 30); do
                _status=$(docker exec "${BACKEND_CONTAINER}" python -c "import urllib.request, json; r=json.loads(urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()); print(r.get('status','unknown'))" 2>/dev/null || echo "ERR")
                if [ "${_status}" = "ok" ]; then
                  echo "[OK] 回滚后 /health status=ok"
                  break
                fi
                echo "[WAIT] 回滚后健康检查第 ${i}/30 次..."
                sleep 2
              done
            else
              echo "::error::自动回滚失败，请手动修复"
            fi
          else
            echo "::error::无法获取 previous_head，跳过自动回滚"
          fi

          # 轻量 webhook 通知（如果配置了）
          if [ -n "${DEPLOY_WEBHOOK_URL:-}" ]; then
            curl -s -X POST "${DEPLOY_WEBHOOK_URL}" \
              -H 'Content-Type: application/json' \
              -d "{\"workflow\":\"${{ github.workflow }}\",\"run_id\":\"${{ github.run_id }}\",\"run_attempt\":\"${{ github.run_attempt }}\",\"actor\":\"${{ github.actor }}\",\"previous\":\"${PREVIOUS_HEAD}\",\"current\":\"${CURRENT_HEAD}\",\"status\":\"failed/rolled-back\"}" \
              >/dev/null 2>&1 || echo "[WARN] webhook 通知发送失败"
          fi

          # 同时写入本地日志
          LOG_FILE="${ROLLBACK_LOG_DIR}/deploy-failures.log"
          mkdir -p "${ROLLBACK_LOG_DIR}" 2>/dev/null || LOG_FILE="/tmp/deploy-failures.log"
          {
            echo "============================================"
            echo "timestamp: $(date -Iseconds 2>/dev/null || date)"
            echo "workflow:  ${{ github.workflow }}"
            echo "run_id:    ${{ github.run_id }}"
            echo "run_attempt: ${{ github.run_attempt }}"
            echo "actor:     ${{ github.actor }}"
            echo "previous_head: ${PREVIOUS_HEAD}"
            echo "current_head:  ${CURRENT_HEAD}"
            echo "============================================"
          } | tee -a "${LOG_FILE}"

      # ── 7. 成功摘要 ──
      - name: Deployment summary
        if: success()
        run: |
          set -euo pipefail
          cd "${PROJECT_ROOT}"
          PREVIOUS_HEAD=$(cat "${ROLLBACK_LOG_DIR}/previous_head" 2>/dev/null || echo "")
          CURRENT_HEAD=$(git rev-parse HEAD)

          {
            echo "## Deployment OK"
            echo ""
            echo "- previous: \`${PREVIOUS_HEAD:0:7}\`"
            echo "- current:  \`${CURRENT_HEAD:0:7}\`"
            if [ -n "${PREVIOUS_HEAD}" ] && [ "${PREVIOUS_HEAD}" != "${CURRENT_HEAD}" ]; then
              echo ""
              echo "### 变更摘要"
              git log --oneline "${PREVIOUS_HEAD}..${CURRENT_HEAD}" | head -20
            fi
          } >> "$GITHUB_STEP_SUMMARY"
